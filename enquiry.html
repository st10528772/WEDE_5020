<!DOCTYPE html>
<html lang="en">

<!-- ============================================================
     PAGE: Enquiry (enquiry.html)
     DESCRIPTION: Allows visitors to submit a product or service
     enquiry to Makro via an embedded Google Form. The page uses
     a grocery store background image to reinforce the retail theme.
     AUTHOR: [Palesa Dikolane]
     STUDENT NUMBER: [St10528772]
     MODULE: WEDE5020
     DATE:29 May 2026
     ============================================================ -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Submit a product or service enquiry to Makro South Africa. We will respond within 24 hours.">
  <meta name="keywords" content="Makro enquiry, contact form, product enquiry, South Africa, wholesale, customer service">
  <link rel="canonical" href="https://makro-poe.netlify.app/enquiry.html">
  <title>Enquiry | Makro</title>
  <link rel="stylesheet" href="css/style_sheet.css">
</head>

<!-- body class="enquiry" activates the grocery background image
     and flex centred layout defined in style_sheet.css -->
<body class="enquiry">

  <!-- ============================================================
       HEADER: Logo, brand name, and navigation. Identical across
       all five pages.
       ============================================================ -->
  <header>
    <div class="header-top">
      <img src="images/makro_logo.png" alt="Makro Logo" class="makro_logo">
      <h1>Makro</h1>
    </div>
    <button class="menu-toggle" aria-label="Open navigation menu">☰</button>
    <nav class="navigation">
      <table>
        <tr>
          <td><a href="index.html">Home</a></td>
          <td><a href="about_us.html">About Us</a></td>
          <td><a href="services_or_products.html">Products</a></td>
          <!-- Enquiry is the active/current page -->
          <td><a href="enquiry.html" class="active">Enquiry</a></td>
          <td><a href="contact_us.html">Contact Us</a></td>
        </tr>
      </table>
    </nav>
  </header>
  <!-- ===== END HEADER ===== -->

  <!-- ============================================================
       MAIN: Enquiry page — heading and embedded Google Form.
       The form-card div provides a white background card over the
       grocery store background image for readability.
       ============================================================ -->
  <main>
    <!-- White card wrapping the heading and Google Form -->
    <div class="form-card">
      <h2>Enquiry Form</h2>
      <p>Please complete the form below. We will get back to you within 24 hours.</p>

      <!-- ========================================================
           NATIVE ENQUIRY FORM (Part 3 — replaces the Part 2 Google
           Form embed with a real HTML form so it can be validated
           and processed with JavaScript, per the Part 3 brief).
           Validation and submission handling live in js/forms.js.
           ======================================================== -->
      <form id="enquiryForm" class="site-form" novalidate>

        <div class="form-group">
          <label for="enquiryName">Full Name</label>
          <input type="text" id="enquiryName" name="enquiryName" required minlength="2" aria-describedby="enquiryNameError">
          <span class="error-message" id="enquiryNameError"></span>
        </div>

        <div class="form-group">
          <label for="enquiryEmail">Email Address</label>
          <input type="email" id="enquiryEmail" name="enquiryEmail" required aria-describedby="enquiryEmailError">
          <span class="error-message" id="enquiryEmailError"></span>
        </div>

        <div class="form-group">
          <label for="enquiryPhone">Phone Number</label>
          <input type="tel" id="enquiryPhone" name="enquiryPhone" required data-validate="phone" placeholder="082 123 4567" aria-describedby="enquiryPhoneError">
          <span class="error-message" id="enquiryPhoneError"></span>
        </div>

        <div class="form-group">
          <label for="enquiryType">What is your enquiry about?</label>
          <select id="enquiryType" name="enquiryType" required aria-describedby="enquiryTypeError">
            <option value="" disabled selected>Select an enquiry type…</option>
            <option value="Product Availability">Product Availability</option>
            <option value="Pricing">Pricing</option>
            <option value="Bulk Order">Bulk Order</option>
            <option value="General Service">General Service</option>
          </select>
          <span class="error-message" id="enquiryTypeError"></span>
        </div>

        <div class="form-group">
          <label for="enquiryCategory">Product Category</label>
          <select id="enquiryCategory" name="enquiryCategory" required aria-describedby="enquiryCategoryError">
            <option value="" disabled selected>Select a category…</option>
            <option value="groceries">Groceries</option>
            <option value="household">Household</option>
            <option value="outdoor">Outdoor</option>
          </select>
          <span class="error-message" id="enquiryCategoryError"></span>
        </div>

        <div class="form-group">
          <label for="enquiryMessage">Tell us more</label>
          <textarea id="enquiryMessage" name="enquiryMessage" rows="4" required aria-describedby="enquiryMessageError"></textarea>
          <span class="error-message" id="enquiryMessageError"></span>
        </div>

        <button type="submit" class="cta-btn">Submit Enquiry</button>

        <!-- Populated dynamically by js/forms.js once the enquiry is processed -->
        <div id="enquiryResponse" class="response-box" role="status" hidden></div>
      </form>
      <!-- ===== END ENQUIRY FORM ===== -->
    </div>
  </main>
  <!-- ===== END MAIN ===== -->

  <footer>
    <p>&copy; 2026 Makro. All rights reserved.</p>
  </footer>

  <script src="js/forms.js" defer></script>
</body>
</html>
